<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login - AF-Task Manager</title>
<link rel="icon" type="image/png" href="image/logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<video autoplay muted loop id="bg-video">
    <source src="image/index.mp4" type="video/mp4">
</video>

<!--login card -->
<div class="login-card card">
  <h4 class="card-title mb-3 text-center">Welcome To Task Manager</h4>

<!-- error/success message -->
<div id="error-msg" class="alert alert-danger d-none"></div>

  <!-- login form -->
  <form id="login-form" novalidate>
    <div class="mb-3">
      <label class="form-label">Username</label> <!-- username input -->
      <input id="username" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Password</label> <!-- password input -->
        <input id="password" name="password" type="password" class="form-control" required>
    </div>
    <button class="btn btn-primary w-100" type="submit">Login</button>
  </form>

  <!-- register form (hidden by default) -->
  <form id="register-form" class="d-none" novalidate>
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input id="reg-name" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input id="reg-email" type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input id="reg-username" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input id="reg-password" type="password" name="password" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Role</label>
      <select id="reg-role" class="form-select" required>
        <option value="Student" selected>Student</option>
        <option value="Admin">Admin</option>
      </select>
    </div>
    <button class="btn btn-success w-100" type="submit">Register</button>
  </form>

  <!-- Toggle Link -->
  <div class="text-center mt-3">
    <a href="#" id="toggle-form-link" style="text-decoration: none; font-size: 14px;">Don't have an account? Register here</a>
  </div>

  <!-- login hint -->
  <div class="alert alert-info mt-3" id="login-hint-box">
      <strong>Login Hint:</strong><br>
      Username & Password: adlinadmin<br>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

<script>
  const loginForm = document.getElementById('login-form');
  const registerForm = document.getElementById('register-form');
  const toggleLink = document.getElementById('toggle-form-link');
  const cardTitle = document.querySelector('.card-title');
  const errorMsg = document.getElementById('error-msg');
  const hintBox = document.getElementById('login-hint-box');

  toggleLink.addEventListener('click', function(e) {
    e.preventDefault();
    errorMsg.classList.add('d-none');
    if (loginForm.classList.contains('d-none')) {
      loginForm.classList.remove('d-none');
      registerForm.classList.add('d-none');
      toggleLink.textContent = "Don't have an account? Register here";
      cardTitle.textContent = "Welcome To Task Manager";
      if (hintBox) hintBox.classList.remove('d-none');
    } else {
      loginForm.classList.add('d-none');
      registerForm.classList.remove('d-none');
      toggleLink.textContent = "Already have an account? Login here";
      cardTitle.textContent = "Create an Account";
      if (hintBox) hintBox.classList.add('d-none');
    }
  });

  // Login form submit functionality
  loginForm.addEventListener('submit', function(e) {
    e.preventDefault(); // prevent page reload

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    // check if username and password match any user in array
    const user = users.find(u => u.username === username && u.password === password);

    if(user) 
    {
      // save login user in localStorage
      localStorage.setItem('loggedInUser', username);
      window.location.href = 'dashboard.html'; // direct dashboard page
    } else 
    {
      // show error message
      errorMsg.textContent = 'Invalid username or password.';
      errorMsg.className = 'alert alert-danger';
      errorMsg.classList.remove('d-none');
    }
  });

  // Register form submit functionality
  registerForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value.trim();
    const role = document.getElementById('reg-role').value;

    if (!name || !email || !username || !password) {
      errorMsg.textContent = 'All fields are required.';
      errorMsg.className = 'alert alert-danger';
      errorMsg.classList.remove('d-none');
      return;
    }

    // check if username already exists
    const userExists = users.some(u => u.username.toLowerCase() === username.toLowerCase());
    if (userExists) {
      errorMsg.textContent = 'Username is already taken.';
      errorMsg.className = 'alert alert-danger';
      errorMsg.classList.remove('d-none');
      return;
    }

    // add new user to the global users list
    const newUser = {
      name: name,
      email: email,
      username: username,
      password: password,
      role: role,
      image: 'image/starter.png' // default avatar
    };

    users.push(newUser);
    saveUsers(users);

    // show success notification
    errorMsg.textContent = 'Registration successful! You can now log in.';
    errorMsg.className = 'alert alert-success';
    errorMsg.classList.remove('d-none');

    // switch back to login form
    loginForm.classList.remove('d-none');
    registerForm.classList.add('d-none');
    toggleLink.textContent = "Don't have an account? Register here";
    cardTitle.textContent = "Welcome To Task Manager";
    if (hintBox) hintBox.classList.remove('d-none');

    // reset forms
    registerForm.reset();
    loginForm.reset();
  });
</script>
</body>
</html>
