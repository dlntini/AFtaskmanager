<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings - AF-Task Manager</title>
    <link rel="icon" type="image/png" href="image/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .preset-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 4px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .preset-btn:hover {
            transform: scale(1.15);
        }
    </style>
</head>

<body class="users-page">

<!-- header -->
<header class="main-header">
    <div class="header-left d-flex align-items-center gap-2">
        <button id="sidebarToggle" class="btn text-white p-0 border-0 fs-4 me-2 d-md-none" onclick="toggleMobileSidebar()"><i class="fa-solid fa-bars"></i></button>
        <h2>AF-TASK MANAGER</h2>
    </div>
    <div class="header-right">
        Welcome Back, <span id="userName"></span>
    </div>
</header>

<!-- footer -->
<footer class="main-footer">&copy; 2026 AF-Task Manager</footer>

<!-- sidebar -->
<div class="sidebar">
    <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="tasks.html" class="dropdown-toggle"><i class="fa-solid fa-list-check"></i> Tasks</a>
    <a href="users.html"><i class="fa-regular fa-user"></i> Users</a>
    <a href="settings.html" class="active"><i class="fa-solid fa-gear"></i> Settings</a>
    <a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</div>

<!-- main content -->
<div class="content">
    <div class="row mt-4">
        <!-- Account Settings Card -->
        <div class="col-md-6 mb-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-header bg-light py-3">
                    <h5 class="mb-0 text-primary" style="font-weight:600;"><i class="fa-solid fa-user-gear me-2"></i>Account Profile</h5>
                </div>
                <div class="card-body p-4">
                    <form id="profile-form">
                        <div class="mb-3">
                            <label class="form-label" style="font-weight:500;">Display Name</label>
                            <input type="text" id="profile-name" class="form-control" placeholder="Enter your display name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-weight:500;">Email Address</label>
                            <input type="email" id="profile-email" class="form-control" placeholder="Enter email address" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-weight:500;">Username</label>
                            <input type="text" id="profile-username" class="form-control" placeholder="Enter username" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label" style="font-weight:500;">Password</label>
                            <div class="input-group">
                                <input type="password" id="profile-password" class="form-control" placeholder="Enter password" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    <i class="fa-regular fa-eye" id="toggleIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary px-4 py-2 w-100" style="font-weight:500; font-size: 15px;">
                            <i class="fa-solid fa-floppy-disk me-2"></i>Save Account Settings
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Custom Styling / Theme Card -->
        <div class="col-md-6 mb-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-header bg-light py-3">
                    <h5 class="mb-0 text-primary" style="font-weight:600;"><i class="fa-solid fa-palette me-2"></i>Theme Customization</h5>
                </div>
                <div class="card-body p-4">
                    <form id="theme-form">
                        <!-- Theme Presets -->
                        <div class="mb-4">
                            <label class="form-label d-block" style="font-weight:500;">Theme Color Presets</label>
                            <div class="d-flex gap-3 mt-2">
                                <button type="button" class="preset-btn" style="background-color: #1100ff;" onclick="applyPreset('#1100ff', '#1100ff')" title="Classic Blue"></button>
                                <button type="button" class="preset-btn" style="background-color: #6f42c1;" onclick="applyPreset('#6f42c1', '#6f42c1')" title="Royal Purple"></button>
                                <button type="button" class="preset-btn" style="background-color: #343a40;" onclick="applyPreset('#343a40', '#343a40')" title="Sleek Charcoal"></button>
                                <button type="button" class="preset-btn" style="background-color: #198754;" onclick="applyPreset('#198754', '#198754')" title="Emerald Green"></button>
                                <button type="button" class="preset-btn" style="background-color: #fd7e14;" onclick="applyPreset('#fd7e14', '#fd7e14')" title="Sunset Orange"></button>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label" style="font-weight:500;">Header Color</label>
                                <div class="d-flex align-items-center gap-2">
                                    <input type="color" id="theme-header-color" class="form-control form-control-color" style="width: 50px; height: 38px; padding: 4px;" value="#1100ff">
                                    <span style="font-size: 13px; color: #666;" id="headerColorText">#1100ff</span>
                                </div>
                            </div>
                            <div class="col-6">
                                <label class="form-label" style="font-weight:500;">Footer Color</label>
                                <div class="d-flex align-items-center gap-2">
                                    <input type="color" id="theme-footer-color" class="form-control form-control-color" style="width: 50px; height: 38px; padding: 4px;" value="#1100ff">
                                    <span style="font-size: 13px; color: #666;" id="footerColorText">#1100ff</span>
                                </div>
                            </div>
                        </div>


                        <button type="submit" class="btn btn-primary px-4 py-2 w-100" style="font-weight:500; font-size: 15px;">
                            <i class="fa-solid fa-circle-check me-2"></i>Apply Custom Theme
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- toast notification -->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 1055">
    <div id="settingsToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">Settings updated successfully!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
    // initialize toast
    const settingsToastEl = document.getElementById('settingsToast');
    const settingsToast = new bootstrap.Toast(settingsToastEl);

    function showSettingsToast(msg, type='success') {
        settingsToastEl.className = `toast align-items-center text-bg-${type} border-0`;
        document.getElementById('toastMessage').textContent = msg;
        settingsToast.show();
    }

    // load settings
    const currentUsername = getCurrentUser();
    let currentUser = users.find(u => u.username === currentUsername);

    if (currentUser) {
        // Fill Profile form
        document.getElementById('profile-name').value = currentUser.name || '';
        document.getElementById('profile-email').value = currentUser.email || '';
        document.getElementById('profile-username').value = currentUser.username || '';
        document.getElementById('profile-password').value = currentUser.password || '';

        // Fill Theme form
        const headerColorVal = currentUser.headerColor || '#1100ff';
        const footerColorVal = currentUser.footerColor || '#1100ff';
        document.getElementById('theme-header-color').value = headerColorVal;
        document.getElementById('headerColorText').textContent = headerColorVal;
        document.getElementById('theme-footer-color').value = footerColorVal;
        document.getElementById('footerColorText').textContent = footerColorVal;
    }

    // Color pickers value labels updating
    document.getElementById('theme-header-color').addEventListener('input', function(e) {
        document.getElementById('headerColorText').textContent = e.target.value;
    });
    document.getElementById('theme-footer-color').addEventListener('input', function(e) {
        document.getElementById('footerColorText').textContent = e.target.value;
    });

    // Theme preset applier
    function applyPreset(headerCol, footerCol) {
        document.getElementById('theme-header-color').value = headerCol;
        document.getElementById('headerColorText').textContent = headerCol;
        document.getElementById('theme-footer-color').value = footerCol;
        document.getElementById('footerColorText').textContent = footerCol;
    }

    // Toggle Password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
        const passwordInput = document.getElementById('profile-password');
        const icon = document.getElementById('toggleIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.className = 'fa-regular fa-eye-slash';
        } else {
            passwordInput.type = 'password';
            icon.className = 'fa-regular fa-eye';
        }
    });

    // Handle Profile Form submit
    document.getElementById('profile-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const newName = document.getElementById('profile-name').value.trim();
        const newEmail = document.getElementById('profile-email').value.trim();
        const newUsername = document.getElementById('profile-username').value.trim();
        const newPassword = document.getElementById('profile-password').value.trim();

        if (!newName || !newEmail || !newUsername || !newPassword) {
            showSettingsToast("All fields are required!", "danger");
            return;
        }

        // Check uniqueness of username
        const list = getUsers();
        const existingUser = list.find(u => u.username === newUsername);
        if (existingUser && currentUser && existingUser.username !== currentUser.username) {
            showSettingsToast("Username is already taken by another account!", "danger");
            return;
        }

        // Migrate task data if username changed
        const oldUsername = currentUser.username;
        if (oldUsername !== newUsername) {
            let allTasks = JSON.parse(localStorage.getItem('tasks')) || {};
            if (allTasks[oldUsername]) {
                allTasks[newUsername] = allTasks[oldUsername];
                delete allTasks[oldUsername];
                localStorage.setItem('tasks', JSON.stringify(allTasks));
            }
            // Update current user key in localStorage
            localStorage.setItem('loggedInUser', newUsername);
        }

        // Update user record
        const userInList = list.find(u => u.username === oldUsername);
        if (userInList) {
            userInList.name = newName;
            userInList.email = newEmail;
            userInList.username = newUsername;
            userInList.password = newPassword;
            saveUsers(list);
            
            // Reload local window copy
            users = list;
            currentUser = userInList;
            
            // Refresh displayed user name in header
            const el = document.getElementById('userName');
            if(el) el.textContent = newName;

            showSettingsToast("Profile updated successfully!");
        }
    });

    // Handle Theme Form submit
    document.getElementById('theme-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const headerCol = document.getElementById('theme-header-color').value;
        const footerCol = document.getElementById('theme-footer-color').value;

        // header color to background image
        const bgMap = {
            '#1100ff': 'image/background.jpeg',       // Blue
            '#6f42c1': 'image/backgroundpurple.jpeg', // Purple
            '#343a40': 'image/backgroundblack.jpeg',  // Black
            '#198754': 'image/backgroundgreen.jpeg',  // Green
            '#fd7e14': 'image/backgroungoren.jpeg'    // Orange
        };
        const bgImg = bgMap[headerCol] || 'image/background.jpeg';

        const list = getUsers();
        const userInList = list.find(u => u.username === currentUser.username);
        if (userInList) {
            userInList.headerColor = headerCol;
            userInList.footerColor = footerCol;
            userInList.backgroundImage = bgImg;
            saveUsers(list);

            // Reload local window copy
            users = list;
            currentUser = userInList;

            // Apply style dynamically now
            applyUserStyles();

            showSettingsToast("Theme styles applied successfully!");
        }
    });
</script>
</body>
</html>
